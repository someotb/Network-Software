name: ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    env:
      GROUP: "331"
      STUDENT_ID: "s15"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pylint
      - name: Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      WEEK: "14"
      GROUP: "331"
      STUDENT_ID: "s15"
      IMAGE_NAME: "orders-s15"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: |
          pytest weeks/week-14/tests -v || make test WEEK=${{ env.WEEK }}

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_NAME: "orders-s15"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
      - name: Save Docker image
        run: |
          docker save $IMAGE_NAME:latest -o /tmp/orders-s15.tar
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/orders-s15.tar
          retention-days: 7

  publish:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp README.md artifacts/ || true
          cp weeks/week-14/README.md artifacts/week-14.md || true
          echo "Build completed at $(date)" > artifacts/build-info.txt
          echo "Image: orders-s15" >> artifacts/build-info.txt
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts
