services:
  # Tickets Service - основной сервис управления тикетами
  tickets-service:
    build:
      context: ./services/tickets-service
      dockerfile: Dockerfile
    container_name: tickets-svc-s15
    ports:
      - "8124:8124"
    environment:
      - DATABASE_URL=postgresql://tickets_user:tickets_pass@postgres:5432/tickets_db
      - REDIS_URL=redis://redis:6379/0
      - USERS_SERVICE_URL=http://users-service:8125
      - NOTIFICATION_SERVICE_URL=notification-service:50051
    depends_on:
      - postgres
      - redis
      - users-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8124/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tickets-network

  # Users Service - управление пользователями (упрощенная версия без JWT)
  users-service:
    build:
      context: ./services/users-service
      dockerfile: Dockerfile
    container_name: users-svc-s15
    ports:
      - "8125:8125"
    environment:
      - DATABASE_URL=postgresql://tickets_user:tickets_pass@postgres:5432/tickets_db
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8125/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tickets-network

  # Notification Service - отправка уведомлений через gRPC
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-svc-s15
    ports:
      - "50051:50051"
    environment:
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
    networks:
      - tickets-network

  # PostgreSQL - единая база данных для всех сервисов
  postgres:
    image: postgres:15-alpine
    container_name: postgres-tickets
    environment:
      - POSTGRES_DB=tickets_db
      - POSTGRES_USER=tickets_user
      - POSTGRES_PASSWORD=tickets_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickets_user -d tickets_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tickets-network

  # Redis - кэш и очереди для уведомлений
  redis:
    image: redis:7-alpine
    container_name: redis-tickets
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tickets-network

  # Nginx - API Gateway
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tickets-service
      - users-service
    networks:
      - tickets-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  tickets-network:
    driver: bridge
